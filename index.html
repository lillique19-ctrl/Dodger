<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Fixed POV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blood: #630000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: white; }
        
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        .hp-bar { position: absolute; top: 30px; left: 30px; width: 200px; height: 8px; border: 1px solid #444; background: #000; }
        #hp-fill { width: 100%; height: 100%; background: var(--blood); }
        
        #minimap { 
            position: absolute; bottom: 30px; right: 30px; width: 140px; height: 140px; 
            border: 1px solid #333; border-radius: 50%; background: rgba(0,5,0,0.9);
            overflow: hidden;
        }
        #mm-player { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

        #weapon-wheel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .wheel {
            position: relative; width: 350px; height: 350px; border-radius: 50%;
            border: 1px solid #222; display: flex; align-items: center; justify-content: center;
        }
        .wheel-item {
            position: absolute; width: 90px; height: 90px; background: #050505; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 50%; transition: 0.3s; color: #666; font-size: 0.7rem;
        }
        .wheel-item:hover { border-color: #fff; color: #fff; transform: scale(1.1); background: #111; }
        .item-1 { transform: translateY(-120px); }
        .item-2 { transform: translateX(120px); }
        .item-3 { transform: translateY(120px); }
        .item-4 { transform: translateX(-120px); }

        /* LOADING SCREEN (UNTOUCHED) */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: none; border: 1px solid var(--blood); color: var(--blood); padding: 15px 40px; cursor: pointer; transition: 0.5s; }
        .btn:hover { background: var(--blood); color: white; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="letter-spacing: 8px;">NATURE & BLADE</h1>
        <button id="start-btn" class="btn">INITIALIZE</button>
    </div>

    <div id="hud">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="minimap"><div id="mm-player"></div></div>
    </div>

    <div id="weapon-wheel">
        <div class="wheel">
            <div class="wheel-item item-1" onclick="selectWeapon('FIST')">FISTS</div>
            <div class="wheel-item item-2" onclick="selectWeapon('SWORD')">SWORD</div>
            <div class="wheel-item item-3" onclick="selectWeapon('LIGHT')">FLASHLIGHT</div>
            <div class="wheel-item item-4" onclick="selectWeapon('GUN')">GUN</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, sword, flashlight, flashSpot, clock;
        let isRunning = false, keys = {}, blood = [];
        let yaw = new THREE.Object3D(), pitch = new THREE.Object3D();
        let isFirstPerson = false, lightOn = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x050505));

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x050805}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            player = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x111111}));
            player.position.y = 1;
            scene.add(player);
            
            // Sword
            sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.15), new THREE.MeshStandardMaterial({color: 0x888888}));
            sword.position.set(0.6, 0.2, -0.6);
            sword.visible = false;
            player.add(sword);

            // Flashlight
            flashlight = new THREE.Group();
            const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
            flBody.rotation.x = Math.PI / 2;
            flashlight.add(flBody);
            
            flashSpot = new THREE.SpotLight(0xffffff, 0, 45, Math.PI/5, 0.4, 1);
            flashSpot.position.set(0, 0, -0.1);
            flashSpot.target.position.set(0, 0, -10);
            flashlight.add(flashSpot);
            flashlight.add(flashSpot.target);

            flashlight.position.set(0.6, 0.2, -0.6);
            flashlight.visible = false;
            player.add(flashlight);

            // RIGGING: Camera is a child of PITCH, PITCH is child of YAW
            scene.add(yaw);
            yaw.add(pitch);
            pitch.add(camera);

            clock = new THREE.Clock();
            setupControls();
            startWeatherCycle();
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                isRunning = true;
                renderer.domElement.requestPointerLock();
                animate();
            };

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyQ') {
                    document.getElementById('weapon-wheel').style.display = 'flex';
                    document.exitPointerLock();
                }
                if(e.code === 'KeyV') isFirstPerson = !isFirstPerson;
            });

            window.addEventListener('keyup', e => keys[e.code] = false);

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yaw.rotation.y -= e.movementX * 0.0015;
                    pitch.rotation.x -= e.movementY * 0.0015;
                    pitch.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch.rotation.x));
                }
            });

            window.addEventListener('mousedown', () => {
                if(!isRunning) return;
                if(sword.visible) {
                    sword.position.z = -1.2;
                    setTimeout(() => sword.position.z = -0.6, 100);
                    spawnGore();
                }
                if(flashlight.visible) {
                    lightOn = !lightOn;
                    flashSpot.intensity = lightOn ? 3 : 0;
                }
            });
        }

        function selectWeapon(type) {
            sword.visible = (type === 'SWORD');
            flashlight.visible = (type === 'LIGHT');
            if(!flashlight.visible) { lightOn = false; flashSpot.intensity = 0; }
            document.getElementById('weapon-wheel').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        function startWeatherCycle() {
            const changeWeather = () => {
                const rand = Math.random();
                if(rand < 0.4) { scene.fog = new THREE.FogExp2(0x050505, 0.15); } 
                else if(rand < 0.7) { scene.fog = new THREE.FogExp2(0x0a0a15, 0.1); } 
                else { scene.fog = new THREE.FogExp2(0x020202, 0.05); }
                setTimeout(changeWeather, (Math.random() * (180000) + 120000)); // 2-5 mins
            };
            changeWeather();
        }

        function spawnGore() {
            for(let i=0; i<10; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x440000}));
                p.position.copy(player.position).add(new THREE.Vector3(0, 0.5, -1).applyQuaternion(player.quaternion));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.15, Math.random()*0.2, (Math.random()-0.5)*0.15);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            let moveSpeed = 8 * delta;

            // Movement
            if(keys['KeyW']) player.translateZ(-moveSpeed);
            if(keys['KeyS']) player.translateZ(moveSpeed);
            if(keys['KeyA']) player.translateX(-moveSpeed);
            if(keys['KeyD']) player.translateX(moveSpeed);

            // Fixed Camera Logic: Yaw stays on player
            yaw.position.copy(player.position);
            player.rotation.y = yaw.rotation.y;

            // POV Switch: Instead of lerping, we set hard offsets relative to the rig
            if(isFirstPerson) {
                camera.position.set(0, 0.6, 0); // Eyes of the cylinder
                if(flashlight.visible) flashlight.rotation.x = 0; 
            } else {
                camera.position.set(0, 2, 7); // Offset back 7 units
                camera.lookAt(new THREE.Vector3(0, 0, -5).applyQuaternion(camera.quaternion).add(camera.position));
            }

            // Clean up blood
            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.01;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
