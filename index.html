<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Stable Controls</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blood: #630000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: white; }
        
        /* White Dot Crosshair */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none;
        }

        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        
        #weapon-wheel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .wheel {
            position: relative; width: 300px; height: 300px; border-radius: 50%;
            border: 1px solid #333; display: flex; align-items: center; justify-content: center;
        }
        .wheel-item {
            position: absolute; width: 80px; height: 80px; background: #050505; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 50%; transition: 0.2s; color: #888; font-size: 0.7rem;
        }
        .wheel-item:hover { border-color: #fff; color: #fff; background: #111; }
        .item-1 { transform: translateY(-110px); }
        .item-2 { transform: translateX(110px); }
        .item-3 { transform: translateY(110px); }
        .item-4 { transform: translateX(-110px); }

        /* LOADING SCREEN (REVERTED) */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: none; border: 1px solid var(--blood); color: var(--blood); padding: 15px 40px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--blood); color: white; }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="loading-screen">
        <h1 style="letter-spacing: 8px;">NATURE & BLADE</h1>
        <button id="start-btn" class="btn">INITIALIZE</button>
    </div>

    <div id="hud">
        <div style="position: absolute; bottom: 20px; left: 20px; color: #444; font-size: 0.7rem;">WASD + SHIFT | Q: WHEEL | V: POV</div>
    </div>

    <div id="weapon-wheel">
        <div class="wheel">
            <div class="wheel-item item-1" onclick="selectWeapon('FIST')">FISTS</div>
            <div class="wheel-item item-2" onclick="selectWeapon('SWORD')">SWORD</div>
            <div class="wheel-item item-3" onclick="selectWeapon('LIGHT')">LIGHT</div>
            <div class="wheel-item item-4" onclick="selectWeapon('GUN')">GUN</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, sword, flashlight, flashSpot, clock;
        let isRunning = false, keys = {}, blood = [];
        let isFirstPerson = false, lightOn = false;
        
        // Control Objects
        const pitchObj = new THREE.Object3D();
        const yawObj = new THREE.Object3D();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c0c); 
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0x333333));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 20, 5);
            scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // PLAYER ASSEMBLY
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x222222}));
            player.add(body);
            scene.add(player);

            // ATTACH CAMERA RIG
            player.add(yawObj);
            yawObj.add(pitchObj);
            pitchObj.add(camera);
            
            // Set initial 3rd Person
            camera.position.set(0, 3, 7);
            camera.lookAt(0, 1, 0);

            // Sword
            sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.2), new THREE.MeshStandardMaterial({color: 0x999999}));
            sword.position.set(0.6, 0.5, -0.8);
            sword.visible = false;
            player.add(sword);

            // Flashlight
            flashlight = new THREE.Group();
            const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
            flBody.rotation.x = Math.PI / 2;
            flashlight.add(flBody);
            flashSpot = new THREE.SpotLight(0xffffff, 0, 60, Math.PI/5, 0.3, 1);
            flashSpot.position.set(0, 0, -0.1);
            flashSpot.target.position.set(0, 0, -5);
            flashlight.add(flashSpot); flashlight.add(flashSpot.target);
            flashlight.position.set(0.6, 0.5, -0.8);
            flashlight.visible = false;
            player.add(flashlight);

            clock = new THREE.Clock();
            setupControls();
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                renderer.domElement.requestPointerLock();
            };

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === renderer.domElement) {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('hud').style.display = 'block';
                    isRunning = true;
                } else {
                    isRunning = false;
                }
            });

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyV') togglePOV();
                if(e.code === 'KeyQ') document.getElementById('weapon-wheel').style.display = 'flex';
            });
            window.addEventListener('keyup', e => {
                keys[e.code] = false;
                if(e.code === 'KeyQ') document.getElementById('weapon-wheel').style.display = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    player.rotation.y -= e.movementX * 0.002;
                    pitchObj.rotation.x -= e.movementY * 0.002;
                    pitchObj.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitchObj.rotation.x));
                }
            });

            window.addEventListener('mousedown', () => {
                if(!isRunning) return;
                if(sword.visible) {
                    sword.rotation.x = -1; setTimeout(()=>sword.rotation.x = 0, 100);
                    spawnGore();
                }
                if(flashlight.visible) { lightOn = !lightOn; flashSpot.intensity = lightOn ? 5 : 0; }
            });
        }

        function togglePOV() {
            isFirstPerson = !isFirstPerson;
            if(isFirstPerson) {
                camera.position.set(0, 0.7, 0);
                camera.lookAt(0, 0.7, -1);
            } else {
                camera.position.set(0, 3, 7);
                camera.lookAt(0, 1, 0);
            }
        }

        function selectWeapon(type) {
            sword.visible = (type === 'SWORD');
            flashlight.visible = (type === 'LIGHT');
            document.getElementById('weapon-wheel').style.display = 'none';
        }

        function spawnGore() {
            for(let i=0; i<5; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x880000}));
                p.position.copy(player.position).add(new THREE.Vector3(0,0.5,-1).applyQuaternion(player.quaternion));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isRunning) return;
            
            let delta = clock.getDelta();
            let moveSpeed = (keys['ShiftLeft'] ? 18 : 10) * delta;

            if(keys['KeyW']) player.translateZ(-moveSpeed);
            if(keys['KeyS']) player.translateZ(moveSpeed);
            if(keys['KeyA']) player.translateX(-moveSpeed);
            if(keys['KeyD']) player.translateX(moveSpeed);

            // Sync flashlight to look direction
            if(flashlight.visible) flashlight.rotation.x = pitchObj.rotation.x;

            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.01;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }
        init();
        animate();
    </script>
</body>
</html>
