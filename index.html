<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Dark Forest</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blood: #630000; --ui-gold: #c5a059; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: white; }
        
        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        .hp-bar { position: absolute; top: 30px; left: 30px; width: 200px; height: 8px; border: 1px solid #444; background: #000; }
        #hp-fill { width: 100%; height: 100%; background: var(--blood); }
        
        /* Mini-map */
        #minimap { 
            position: absolute; bottom: 30px; right: 30px; width: 140px; height: 140px; 
            border: 1px solid #333; border-radius: 50%; background: rgba(0,5,0,0.9);
            overflow: hidden; box-shadow: 0 0 20px #000;
        }
        #mm-player { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

        /* REAL CIRCULAR WEAPON WHEEL */
        #weapon-wheel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .wheel {
            position: relative; width: 350px; height: 350px; border-radius: 50%;
            border: 1px solid #222; display: flex; align-items: center; justify-content: center;
        }
        .wheel-item {
            position: absolute; width: 90px; height: 90px; background: #050505; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 50%; transition: 0.3s; color: #666; font-size: 0.7rem;
        }
        .wheel-item:hover { border-color: var(--blood); color: #fff; transform: scale(1.1); background: #111; }
        .item-1 { transform: translateY(-120px); } /* Fist */
        .item-2 { transform: translateX(120px); }  /* Sword */
        .item-3 { transform: translateY(120px); }  /* Axe */
        .item-4 { transform: translateX(-120px); } /* Gun */

        /* Weather effects */
        #weather-shroud { position: fixed; inset: 0; pointer-events: none; transition: 5s ease; z-index: 5; }

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: none; border: 1px solid var(--blood); color: var(--blood); padding: 15px 40px; cursor: pointer; transition: 0.5s; }
        .btn:hover { background: var(--blood); color: white; }
    </style>
</head>
<body>

    <div id="weather-shroud"></div>

    <div id="loading-screen">
        <h1 style="letter-spacing: 8px;">NATURE & BLADE</h1>
        <button id="start-btn" class="btn">INITIALIZE</button>
    </div>

    <div id="hud">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="minimap"><div id="mm-player"></div></div>
    </div>

    <div id="weapon-wheel">
        <div class="wheel">
            <div class="wheel-item item-1" onclick="selectWeapon('FIST')">FISTS</div>
            <div class="wheel-item item-2" onclick="selectWeapon('SWORD')"><span>🗡️</span>SWORD</div>
            <div class="wheel-item item-3" onclick="selectWeapon('AXE')">AXE</div>
            <div class="wheel-item item-4" onclick="selectWeapon('GUN')">GUN</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, sword, clock;
        let isRunning = false, keys = {}, blood = [];
        let yaw = new THREE.Object3D(), pitch = new THREE.Object3D();
        let isFirstPerson = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            // FOV set to 45 for "Hard to see far away" effect
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Very dark ambient light
            scene.add(new THREE.AmbientLight(0x111111));
            const sun = new THREE.DirectionalLight(0xffffff, 0.3);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x050805}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // Player
            player = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x111111}));
            player.position.y = 1;
            scene.add(player);
            
            // Build Sword (Invisible at start)
            const swordGroup = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.15), new THREE.MeshStandardMaterial({color: 0x666666, metalness: 1}));
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.4), new THREE.MeshStandardMaterial({color: 0x221100}));
            blade.position.y = 0.8;
            swordGroup.add(blade);
            swordGroup.add(handle);
            sword = swordGroup;
            sword.position.set(0.6, 0.2, -0.6);
            sword.visible = false; // Player starts with fists
            player.add(sword);

            scene.add(yaw);
            yaw.add(pitch);
            pitch.add(camera);

            clock = new THREE.Clock();
            setupControls();
            startWeatherCycle();
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                isRunning = true;
                renderer.domElement.requestPointerLock();
                animate();
            };

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyQ') {
                    document.getElementById('weapon-wheel').style.display = 'flex';
                    document.exitPointerLock();
                }
                if(e.code === 'KeyV') isFirstPerson = !isFirstPerson;
            });

            window.addEventListener('keyup', e => {
                keys[e.code] = false;
                if(e.code === 'KeyQ') {
                    document.getElementById('weapon-wheel').style.display = 'none';
                    renderer.domElement.requestPointerLock();
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yaw.rotation.y -= e.movementX * 0.0015;
                    pitch.rotation.x -= e.movementY * 0.0015;
                    pitch.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch.rotation.x));
                }
            });

            window.addEventListener('mousedown', () => {
                if(isRunning && sword.visible) {
                    // Attack Animation
                    sword.rotation.x = -1.2;
                    setTimeout(() => sword.rotation.x = 0, 100);
                    spawnGore();
                }
            });
        }

        function selectWeapon(type) {
            // Only spawn sword into hand if Sword is selected
            sword.visible = (type === 'SWORD');
            document.getElementById('weapon-wheel').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        function startWeatherCycle() {
            const changeWeather = () => {
                const rand = Math.random();
                const shroud = document.getElementById('weather-shroud');
                
                if(rand < 0.4) { // Heavy Fog
                    scene.fog = new THREE.FogExp2(0x050505, 0.15);
                    shroud.style.background = "rgba(0,0,0,0.4)";
                } else if(rand < 0.7) { // Rain & Storm
                    scene.fog = new THREE.FogExp2(0x0a0a15, 0.1);
                    shroud.style.background = "rgba(20,20,40,0.5)";
                } else { // Clear but Dark
                    scene.fog = new THREE.FogExp2(0x020202, 0.05);
                    shroud.style.background = "transparent";
                }
                
                // Set next weather change between 2 and 5 minutes
                const nextChange = (Math.random() * (300000 - 120000) + 120000);
                setTimeout(changeWeather, nextChange);
            };
            changeWeather();
        }

        function spawnGore() {
            for(let i=0; i<12; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x440000}));
                p.position.copy(player.position).add(new THREE.Vector3(0, 0.5, -1).applyQuaternion(player.quaternion));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.15, Math.random()*0.2, (Math.random()-0.5)*0.15);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            let moveSpeed = 8 * delta;

            if(keys['KeyW']) player.translateZ(-moveSpeed);
            if(keys['KeyS']) player.translateZ(moveSpeed);
            if(keys['KeyA']) player.translateX(-moveSpeed);
            if(keys['KeyD']) player.translateX(moveSpeed);

            yaw.position.copy(player.position);
            player.rotation.y = yaw.rotation.y;

            if(isFirstPerson) {
                camera.position.set(0, 1.6, 0);
            } else {
                camera.position.set(0, 3, 8);
                camera.lookAt(new THREE.Vector3(0, 1, -5).applyQuaternion(camera.quaternion).add(camera.position));
            }

            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.01;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
