<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <h1>NATURE & BLADE</h1>
        <div class="loader"></div>
        <button id="start-btn" class="btn" style="display:none;">ENTER WORLD</button>
    </div>

    <div id="hud">
        <div class="hp-container"><div id="hp-fill"></div></div>
        <div id="minimap"></div>
        <div class="instructions">P: Menu | V: Change View | Left Click: Attack</div>
    </div>

    <div id="menu">
        <div class="menu-content">
            <h1>SETTINGS</h1>
            <div class="setting-row">
                <label>FOV</label>
                <input type="range" id="fov" min="50" max="110" value="75">
            </div>
            <div class="setting-row">
                <label>Sensitivity</label>
                <input type="range" id="sensitivity" min="1" max="10" value="5">
            </div>
            <div class="setting-row">
                <label>Camera Smoothing</label>
                <input type="checkbox" id="smoothing" checked>
            </div>
            <div class="setting-row">
                <label>Head Bob</label>
                <input type="checkbox" id="headbob" checked>
            </div>
            <button class="btn" id="resume-btn">RESUME</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
