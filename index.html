<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Fixed Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; }
        #loading-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #hud { position: absolute; inset: 0; pointer-events: none; padding: 25px; display: none; }
        .hp-bar { width: 250px; height: 12px; border: 2px solid #fff; background: #222; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0044, #800000); }
        #story-text { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #ff0044; font-size: 1.5rem; text-align: center; opacity: 0; transition: 2s; }
        .btn { background: #ff0044; color: white; border: none; padding: 20px 50px; cursor: pointer; font-size: 1.2rem; font-weight: bold; box-shadow: 0 0 20px #ff0044; }
        .btn:hover { transform: scale(1.1); background: #ff4d79; }
        #error-log { color: #555; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color: #ff0044; font-size: 3rem; margin-bottom: 10px;">NATURE & BLADE</h1>
        <p style="color: #888; margin-bottom: 30px;">[ Gore & Adventure Simulation ]</p>
        <button id="start-btn" class="btn">ENTER WORLD</button>
        <div id="error-log">Verifying Engine Components...</div>
    </div>

    <div id="hud">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="story-text">THE RED FOREST AWAKENS... <br> Slay the Corrupted.</div>
        <div style="margin-top: 15px; color: #00ffcc;">C: Stealth | V: View | Q: Weapons | Left Click: Attack</div>
    </div>

    <script>
        let scene, camera, renderer, player, clock;
        let isRunning = false;
        let enemies = [], blood = [], keys = {};
        let isStealth = false, isFirstPerson = false;
        let yaw = new THREE.Object3D(), pitch = new THREE.Object3D();

        function init() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020202);
                scene.fog = new THREE.FogExp2(0x020202, 0.04);

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Lighting
                scene.add(new THREE.AmbientLight(0x404040, 0.5));
                const sun = new THREE.DirectionalLight(0xffffff, 1);
                sun.position.set(5, 15, 5);
                scene.add(sun);

                // Nature (Ground)
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(200, 200),
                    new THREE.MeshStandardMaterial({color: 0x101510})
                );
                ground.rotation.x = -Math.PI / 2;
                scene.add(ground);

                // Player (Using Cylinder instead of Capsule to prevent errors)
                player = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.5, 2, 16),
                    new THREE.MeshStandardMaterial({color: 0x333333})
                );
                player.position.y = 1;
                scene.add(player);
                
                scene.add(yaw);
                yaw.add(pitch);
                pitch.add(camera);

                // Enemies
                for(let i=0; i<8; i++) {
                    let e = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 2, 1.2), 
                        new THREE.MeshStandardMaterial({color: 0x880000})
                    );
                    e.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                    scene.add(e);
                    enemies.push(e);
                }

                clock = new THREE.Clock();
                document.getElementById('error-log').innerText = "All systems green.";
                setupControls();
            } catch (err) {
                document.getElementById('error-log').innerText = "ERROR: " + err.message;
            }
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                isRunning = true;
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                
                // Show Story Text
                const story = document.getElementById('story-text');
                story.style.opacity = '1';
                setTimeout(() => story.style.opacity = '0', 4000);

                renderer.domElement.requestPointerLock();
                animate();
            };

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyV') isFirstPerson = !isFirstPerson;
                if(e.code === 'KeyC') isStealth = !isStealth;
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yaw.rotation.y -= e.movementX * 0.002;
                    pitch.rotation.x -= e.movementY * 0.002;
                    pitch.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch.rotation.x));
                }
            });

            // Gore on click
            window.addEventListener('mousedown', () => {
                if(isRunning) spawnBlood(player.position, 15);
            });
        }

        function spawnBlood(pos, count) {
            for(let i=0; i<count; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({color: 0xaa0000}));
                p.position.copy(pos);
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.3, Math.random()*0.4, (Math.random()-0.5)*0.3);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);

            let delta = clock.getDelta();
            let speed = (isStealth ? 4 : 12) * delta;

            if(keys['KeyW']) player.translateZ(-speed);
            if(keys['KeyS']) player.translateZ(speed);
            if(keys['KeyA']) player.translateX(-speed);
            if(keys['KeyD']) player.translateX(speed);

            yaw.position.copy(player.position);
            player.rotation.y = yaw.rotation.y;

            if(isFirstPerson) {
                camera.position.set(0, 1.6, 0);
            } else {
                camera.position.set(0, 3, 7);
                camera.lookAt(new THREE.Vector3(0, 1, -2).applyQuaternion(camera.quaternion).add(camera.position));
            }

            // Blood Physics
            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.015;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
