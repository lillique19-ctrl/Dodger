<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Stable Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blood: #630000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: white; }
        
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        .hp-bar { position: absolute; top: 30px; left: 30px; width: 200px; height: 8px; border: 1px solid #666; background: #000; }
        #hp-fill { width: 100%; height: 100%; background: var(--blood); }
        
        #weapon-wheel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .wheel {
            position: relative; width: 350px; height: 350px; border-radius: 50%;
            border: 1px solid #222; display: flex; align-items: center; justify-content: center;
        }
        .wheel-item {
            position: absolute; width: 90px; height: 90px; background: #050505; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 50%; transition: 0.3s; color: #666; font-size: 0.7rem;
        }
        .wheel-item:hover { border-color: #fff; color: #fff; transform: scale(1.1); background: #111; }
        .item-1 { transform: translateY(-120px); }
        .item-2 { transform: translateX(120px); }
        .item-3 { transform: translateY(120px); }
        .item-4 { transform: translateX(-120px); }

        /* REVERTED LOADING SCREEN */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: none; border: 1px solid var(--blood); color: var(--blood); padding: 15px 40px; cursor: pointer; transition: 0.5s; }
        .btn:hover { background: var(--blood); color: white; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="letter-spacing: 8px;">NATURE & BLADE</h1>
        <button id="start-btn" class="btn">INITIALIZE</button>
    </div>

    <div id="hud">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div style="position: absolute; bottom: 20px; left: 20px; color: #555; font-size: 0.7rem;">WASD + SHIFT | Q - WHEEL | V - POV</div>
    </div>

    <div id="weapon-wheel">
        <div class="wheel">
            <div class="wheel-item item-1" onclick="selectWeapon('FIST')">FISTS</div>
            <div class="wheel-item item-2" onclick="selectWeapon('SWORD')">SWORD</div>
            <div class="wheel-item item-3" onclick="selectWeapon('LIGHT')">FLASHLIGHT</div>
            <div class="wheel-item item-4" onclick="selectWeapon('GUN')">GUN</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, sword, flashlight, flashSpot, clock;
        let isRunning = false, keys = {}, blood = [];
        let isFirstPerson = false, lightOn = false;

        // THE RIG: This setup prevents all drifting
        let yawObject = new THREE.Object3D();
        let pitchObject = new THREE.Object3D();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c0c); 
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x252525));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 20, 5);
            scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // PLAYER
            player = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x222222}));
            player.position.y = 1;
            scene.add(player);

            // CAMERA RIG ATTACHMENT
            scene.add(yawObject);
            yawObject.add(pitchObject);
            pitchObject.add(camera);

            // Weapon Models
            sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.2), new THREE.MeshStandardMaterial({color: 0x999999}));
            sword.position.set(0.6, 0, -0.8);
            sword.visible = false;
            player.add(sword);

            flashlight = new THREE.Group();
            const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
            flBody.rotation.x = Math.PI / 2;
            flashlight.add(flBody);
            flashSpot = new THREE.SpotLight(0xffffff, 0, 60, Math.PI/5, 0.3, 1);
            flashSpot.position.set(0, 0, -0.1);
            flashSpot.target.position.set(0, 0, -10);
            flashlight.add(flashSpot); flashlight.add(flashSpot.target);
            flashlight.position.set(0.6, 0, -0.8);
            flashlight.visible = false;
            player.add(flashlight);

            clock = new THREE.Clock();
            setupControls();
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                isRunning = true;
                renderer.domElement.requestPointerLock();
                animate();
            };

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyV') isFirstPerson = !isFirstPerson;
                if(e.code === 'KeyQ') {
                    document.getElementById('weapon-wheel').style.display = 'flex';
                    document.exitPointerLock();
                }
            });
            window.addEventListener('keyup', e => {
                keys[e.code] = false;
                if(e.code === 'KeyQ') {
                    document.getElementById('weapon-wheel').style.display = 'none';
                    renderer.domElement.requestPointerLock();
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    yawObject.rotation.y -= e.movementX * 0.002;
                    pitchObject.rotation.x -= e.movementY * 0.002;
                    pitchObject.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitchObject.rotation.x));
                }
            });

            window.addEventListener('mousedown', () => {
                if(!isRunning) return;
                if(sword.visible) {
                    sword.position.z = -1.2; setTimeout(()=>sword.position.z = -0.8, 100);
                    spawnGore();
                }
                if(flashlight.visible) {
                    lightOn = !lightOn;
                    flashSpot.intensity = lightOn ? 5 : 0;
                }
            });
        }

        function selectWeapon(type) {
            sword.visible = (type === 'SWORD');
            flashlight.visible = (type === 'LIGHT');
            document.getElementById('weapon-wheel').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        function spawnGore() {
            for(let i=0; i<6; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x880000}));
                p.position.copy(player.position).add(new THREE.Vector3(0,0,-1.5).applyQuaternion(player.quaternion));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            let moveSpeed = (keys['ShiftLeft'] ? 18 : 10) * delta;

            // PRECISE MOVEMENT VECTORS
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(yawObject.quaternion);
            let right = new THREE.Vector3(1, 0, 0).applyQuaternion(yawObject.quaternion);

            if(keys['KeyW']) player.position.addScaledVector(forward, moveSpeed);
            if(keys['KeyS']) player.position.addScaledVector(forward, -moveSpeed);
            if(keys['KeyA']) player.position.addScaledVector(right, -moveSpeed);
            if(keys['KeyD']) player.position.addScaledVector(right, moveSpeed);

            // LOCK RIG TO PLAYER
            yawObject.position.copy(player.position);
            player.rotation.y = yawObject.rotation.y;

            // POV HARD-CODED POSITIONS
            if(isFirstPerson) {
                camera.position.set(0, 0.7, 0); // Stuck to head
                if(flashlight.visible) flashlight.rotation.x = pitchObject.rotation.x;
            } else {
                camera.position.set(0, 2.5, 7); // Stuck to back
                camera.lookAt(new THREE.Vector3(0, 0, -10).applyQuaternion(camera.quaternion).add(camera.position));
            }

            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.01;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
