<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Blade: Stable Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --blood: #8a0000; --ui-main: #ffffff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        .hp-bar { position: absolute; top: 30px; left: 30px; width: 200px; height: 10px; border: 1px solid #666; background: #111; }
        #hp-fill { width: 100%; height: 100%; background: var(--blood); }
        
        /* Weapon Wheel */
        #weapon-wheel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .wheel {
            position: relative; width: 300px; height: 300px; border-radius: 50%;
            border: 2px solid #555; display: flex; align-items: center; justify-content: center;
        }
        .wheel-item {
            position: absolute; width: 80px; height: 80px; background: #111; border: 1px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 50%; transition: 0.2s; font-size: 0.7rem; color: #aaa;
        }
        .wheel-item:hover { border-color: #fff; color: #fff; transform: scale(1.1); }
        .item-1 { transform: translateY(-110px); }
        .item-2 { transform: translateX(110px); }
        .item-3 { transform: translateY(110px); }
        .item-4 { transform: translateX(-110px); }

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: var(--blood); color: white; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="letter-spacing: 5px;">NATURE & BLADE</h1>
        <button id="start-btn" class="btn">START GAME</button>
    </div>

    <div id="hud">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div style="margin-top: 50px; margin-left: 30px; font-size: 0.8rem; color: #aaa;">
            WASD: Move | Shift: Sprint | V: POV | Q: Weapons | Click: Attack/Light
        </div>
    </div>

    <div id="weapon-wheel">
        <div class="wheel">
            <div class="wheel-item item-1" onclick="selectWeapon('FIST')">FISTS</div>
            <div class="wheel-item item-2" onclick="selectWeapon('SWORD')">SWORD</div>
            <div class="wheel-item item-3" onclick="selectWeapon('LIGHT')">FLASHLIGHT</div>
            <div class="wheel-item item-4" onclick="selectWeapon('GUN')">GUN</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, sword, flashlight, flashSpot, clock;
        let isRunning = false, keys = {}, blood = [];
        let isFirstPerson = false, lightOn = false;

        // Camera Rig components
        let pitchObject = new THREE.Group();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c0c); // Brightened 15%
            scene.fog = new THREE.FogExp2(0x0c0c0c, 0.035); // Lower fog for visibility
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Light Brightness Buff
            scene.add(new THREE.AmbientLight(0x282828)); 
            const sun = new THREE.DirectionalLight(0xffffff, 0.55);
            sun.position.set(5, 15, 5);
            scene.add(sun);

            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x1a201a}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // PLAYER RIG - The core fix for "Broken POV"
            player = new THREE.Group();
            let body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x222222}));
            player.add(body);
            player.position.set(0, 1, 0);
            scene.add(player);

            // CAMERA PARENTING (Locks camera to player)
            player.add(pitchObject); 
            pitchObject.add(camera);

            // Set default 3rd person position
            camera.position.set(0, 2.5, 6); 
            camera.lookAt(0, 1, -5);

            // Sword
            sword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.15), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            sword.position.set(0.6, 0.2, -0.8);
            sword.visible = false;
            player.add(sword);

            // Flashlight
            flashlight = new THREE.Group();
            const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0x333333}));
            flBody.rotation.x = Math.PI / 2;
            flashlight.add(flBody);
            
            flashSpot = new THREE.SpotLight(0xffffff, 0, 50, Math.PI/5, 0.3, 1);
            flashSpot.position.set(0, 0, -0.2);
            flashSpot.target.position.set(0, 0, -10);
            flashlight.add(flashSpot); flashlight.add(flashSpot.target);
            flashlight.position.set(0.6, 0.2, -0.8);
            flashlight.visible = false;
            player.add(flashlight);

            clock = new THREE.Clock();
            setupControls();
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                isRunning = true;
                renderer.domElement.requestPointerLock();
                animate();
            };

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyV') togglePOV();
                if(e.code === 'KeyQ') { document.getElementById('weapon-wheel').style.display = 'flex'; document.exitPointerLock(); }
            });
            window.addEventListener('keyup', e => {
                keys[e.code] = false;
                if(e.code === 'KeyQ') { document.getElementById('weapon-wheel').style.display = 'none'; renderer.domElement.requestPointerLock(); }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    player.rotation.y -= e.movementX * 0.002;
                    pitchObject.rotation.x -= e.movementY * 0.002;
                    pitchObject.rotation.x = Math.max(-1, Math.min(1, pitchObject.rotation.x));
                }
            });

            window.addEventListener('mousedown', () => {
                if(!isRunning) return;
                if(sword.visible) {
                    sword.rotation.x = -1.2; setTimeout(() => sword.rotation.x = 0, 100);
                    spawnGore();
                }
                if(flashlight.visible) { lightOn = !lightOn; flashSpot.intensity = lightOn ? 4.5 : 0; }
            });
        }

        function togglePOV() {
            isFirstPerson = !isFirstPerson;
            if(isFirstPerson) {
                camera.position.set(0, 0.6, 0); // Head height
                camera.rotation.set(0, 0, 0);
            } else {
                camera.position.set(0, 2.5, 6); // Behind
                camera.lookAt(0, 1, -5);
            }
        }

        function selectWeapon(type) {
            sword.visible = (type === 'SWORD');
            flashlight.visible = (type === 'LIGHT');
            if(!flashlight.visible) { lightOn = false; flashSpot.intensity = 0; }
            document.getElementById('weapon-wheel').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        function spawnGore() {
            for(let i=0; i<8; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x880000}));
                p.position.copy(player.position).add(new THREE.Vector3(0, 0, -1.5).applyQuaternion(player.quaternion));
                p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
                scene.add(p);
                blood.push(p);
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            
            // Sprint: Shift makes you move faster
            let moveSpeed = (keys['ShiftLeft'] || keys['ShiftRight'] ? 16 : 9) * delta;

            // WASD Movement
            if(keys['KeyW']) player.translateZ(-moveSpeed);
            if(keys['KeyS']) player.translateZ(moveSpeed);
            if(keys['KeyA']) player.translateX(-moveSpeed);
            if(keys['KeyD']) player.translateX(moveSpeed);

            // Sync flashlight to where you look in FPS
            if(isFirstPerson && flashlight.visible) {
                flashlight.rotation.x = pitchObject.rotation.x;
            } else if(flashlight.visible) {
                flashlight.rotation.x = 0;
            }

            blood.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.01;
                if(p.position.y < 0) { scene.remove(p); blood.splice(i,1); }
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
